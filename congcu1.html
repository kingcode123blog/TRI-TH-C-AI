        function showStatus(msg, type = 'info') {
            const area = document.getElementById('statusArea');
            let textClass = "text-cyan-400";
            let icon = '<i class="fa-solid fa-circle-info"></i>';

            if(type === 'success') { textClass = "text-blue-400"; icon = '<i class="fa-solid fa-check-circle"></i>'; }
            if(type === 'error') { textClass = "text-red-400"; icon = '<i class="fa-solid fa-triangle-exclamation"></i>'; }
            if(type === 'loading') { textClass = "text-cyan-400"; icon = '<i class="fa-solid fa-circle-notch animate-spin inline-block"></i>'; }

            area.innerHTML = `<div class="status-glow ${textClass}">${icon} <span>${msg}</span></div>`;
        }

        function isValidFileType(file) {
            const validMimeTypes = [
                'application/pdf', 
                'application/msword', 
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
            ];
            if (validMimeTypes.includes(file.type)) return true;
            const ext = file.name.split('.').pop().toLowerCase();
            if (['pdf', 'doc', 'docx'].includes(ext)) return true;
            return false;
        }

        async function processInputFile(file) {
            if(!file || isProcessing) return;
            if(!isValidFileType(file)) return;
            
            setLock(true); 
            document.getElementById('file-info-box').classList.remove('hidden');
            document.getElementById('file-info-box').classList.add('flex');
            document.getElementById('file-name').innerText = file.name;
            
            document.getElementById('extract-loading').classList.remove('hidden');
            document.getElementById('extract-loading').classList.add('flex');
            document.getElementById('result-text').value = "";
            const formData = new FormData();
            formData.append('file', file);
            
            try {
                const res = await fetch(EXTRACT_SERVER_URL, { method: 'POST', body: formData });
                const data = await res.json();
                if(data.success) {
                    const txtArea = document.getElementById('result-text');
                    txtArea.value = data.text;
                    txtArea.disabled = false;
                }
            } catch(e) {
                showStatus("Lỗi kết nối máy chủ!", "error");
                removeFile();
            } finally {
                document.getElementById('extract-loading').classList.add('hidden');
                document.getElementById('extract-loading').classList.remove('flex');
                setLock(false); 
            }
        }

        const dropZone = document.getElementById('drop-zone');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            if(isProcessing) return;
            dropZone.classList.add('drag-active');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-active');
            if(isProcessing) return;

            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                processInputFile(e.dataTransfer.files[0]);
            }
        });

        const fileInput = document.getElementById('file-input');
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                processInputFile(e.target.files[0]);
            }
            e.target.value = "";
        });

        function removeFile() {
            if(isProcessing) return;
            fileInput.value = "";
            document.getElementById('file-info-box').classList.add('hidden');
            document.getElementById('file-info-box').classList.remove('flex');
            const txtArea = document.getElementById('result-text');
            txtArea.value = "";
            txtArea.disabled = true;
            document.getElementById('statusArea').innerHTML = "";
        }

        async function handleSend() {
            if(isProcessing) return;
            
            const input = document.getElementById('userInput').value.trim();
            const extracted = document.getElementById('result-text').value.trim();
            const hasFile = !document.getElementById('file-info-box').classList.contains('hidden');
            const fileName = document.getElementById('file-name').innerText;
            
            if(API_KEYS.length == 0) { alert("Chưa có API Key nào được cấu hình từ GitHub Secrets!"); return; }
            if(!input && !extracted) { alert("Vui lòng nhập yêu cầu hoặc tải file!"); return; }
            
            let finalContentToAI = extracted ? extracted : input;
            const chatBox = document.getElementById('chatBox');
            
            let userMsgHTML = `<div class="flex justify-end"><div class="user-msg p-2.5 md:p-4 text-[14px] md:max-w-[85%] shadow-md leading-relaxed flex flex-col gap-2">`;
            
            if (hasFile && extracted) {
                userMsgHTML += `
                    <div class="flex items-center gap-1.5 md:gap-2 bg-black/20 p-2 rounded-lg border border-white/20 mb-1">
                        <i class="fa-solid fa-file-lines text-lg md:text-2xl text-cyan-200"></i>
                        <span class="font-semibold text-cyan-50 text-[11px] md:text-[15px] truncate max-w-[120px] md:max-w-[200px]">${fileName}</span>
                        <i class="fa-solid fa-check-circle text-cyan-300 ml-auto"></i>
                    </div>
                `;
                if(input) { userMsgHTML += `<span>${input}</span>`; }
            } else {
                userMsgHTML += `<span>${input}</span>`;
            }

            userMsgHTML += `</div></div>`;
            chatBox.innerHTML += userMsgHTML;
            
            const aiThinkingHTML = `
            <div id="ai-loading-bubble" class="flex justify-start mt-2">
                <div class="ai-msg p-3 md:p-4 border border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.3)] flex items-center gap-3">
                    <div class="animate-spin duration-[2000ms] ease-linear infinite flex items-center justify-center">
                        <span class="text-3xl font-bold" style="color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.8), 0 0 20px rgba(180,77,255,0.6); margin-top: -4px;">⬡</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="text-cyan-300 text-xs md:text-sm font-bold tracking-wider">AI đang suy nghĩ</span>
                        <span class="flex gap-1 mt-1">
                            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0s"></span>
                            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.15s"></span>
                            <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
                        </span>
                    </div>
                </div>
            </div>`;
            chatBox.innerHTML += aiThinkingHTML;
            chatBox.scrollTop = chatBox.scrollHeight;
            document.getElementById('userInput').value = "";
            if (hasFile) { removeFile(); }
            
            setLock(true); 

            let responseData = null;
            let apiSuccess = false;

            // Thuật toán duyệt qua từng API Key
            for (let i = 0; i < API_KEYS.length; i++) {
                const currentKey = API_KEYS[i];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${currentKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            contents: [{ parts: [{ text: finalContentToAI }] }]
                        })
                    });
                    
                    const data = await response.json();
                    
                    // Bắt các lỗi từ API (ví dụ 400, 403, 429)
                    if(data.error) {
                        throw new Error(data.error.message);
                    }

                    // Nếu không có lỗi, lưu dữ liệu và thoát vòng lặp lập tức
                    responseData = data;
                    apiSuccess = true;
                    break; 

                } catch (err) {
                    continue;
                    // Tiếp tục vòng lặp tới key tiếp theo
                }
            }

            try {
                if (!apiSuccess || !responseData) {
                    throw new Error("Tất cả API Keys đều bị lỗi, quá tải hoặc hết hạn!");
                }

                currentAIContent = responseData.candidates[0].content.parts[0].text;
                mảng_nội_dung = currentAIContent.split("1e9658952");
                
                const displayHTML = mảng_nội_dung.length > 1 ? mảng_nội_dung[1].trim() : currentAIContent;

                const loadingBubble = document.getElementById('ai-loading-bubble');
                if (loadingBubble) { loadingBubble.remove(); }

                const uniqueId = "ai-msg-" + Date.now();
                chatBox.innerHTML += `<div class="flex justify-start"><div id="${uniqueId}" class="ai-msg p-2.5 md:p-4 text-[14px] md:max-w-[85%] whitespace-pre-wrap leading-relaxed"></div></div>`;
                
                const aiMsgElement = document.getElementById(uniqueId);
                const tokens = displayHTML.split(/(\s+)/); 
                let tokenIndex = 0;
                let accumulatedText = "";

                function streamContent() {
                    if (tokenIndex < tokens.length) {
                        let chunk = tokens.slice(tokenIndex, tokenIndex + 5).join("");
                        tokenIndex += 5;
                        
                        accumulatedText += chunk;
                        aiMsgElement.textContent = accumulatedText; 
                        chatBox.scrollTop = chatBox.scrollHeight;
                        
                        setTimeout(streamContent, 4); 
                    } else {
                        aiMsgElement.innerHTML = displayHTML;
                        if (window.MathJax) {
                            MathJax.typesetPromise([aiMsgElement]).then(() => {
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }).catch(() => {});
                        }
                        showStatus("Tạo đề thành công!", "success");
                        setLock(false);
                    }
                }
                streamContent();
                
            } catch (err) {
                const loadingBubble = document.getElementById('ai-loading-bubble');
                if (loadingBubble) { loadingBubble.remove(); }
                showStatus("Lỗi: " + (err.message), "error");
                setLock(false);
            }
        }

        async function handleProcessRender() {
            if (isProcessing) return; 
            if (!currentAIContent) { alert("Chưa có đề thi để xử lý!"); return; }
            
            setLock(true); 
            showStatus("Đang xử lý Wayground...", "loading");

            try {
                const textToProcess = mảng_nội_dung.length > 1 ? mảng_nội_dung[1].trim() : currentAIContent;
                const response = await fetch(`${RENDER_SERVER_URL}/api/process`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: textToProcess })
                });

                if(!response.ok) throw new Error("Lỗi Server Wayground");

                const data = await response.json();
                const fileList = document.getElementById("fileList");
                
                fileList.innerHTML = `
                    <a href="${RENDER_SERVER_URL}${data.excel_url}" class="flex items-center justify-between p-2 md:p-3 bg-[#0f141b] border border-[#1e293b] rounded-lg hover:border-cyan-500 hover:shadow-[0_0_10px_rgba(6,182,212,0.2)] transition-all text-xs md:text-sm text-gray-100">
                        <span class="truncate pr-2"><i class="fa-solid fa-file-excel text-cyan-500 mr-1 md:text-lg"></i> Excel Wayground</span>
                        <span class="text-cyan-400 font-bold bg-cyan-500/10 px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-cyan-500/30 whitespace-nowrap"><i class="fa-solid fa-download"></i> Tải</span>
                    </a>
                    <a href="${RENDER_SERVER_URL}${data.word_bold_url}" class="flex items-center justify-between p-2 md:p-3 bg-[#0f141b] border border-[#1e293b] rounded-lg hover:border-blue-500 hover:shadow-[0_0_10px_rgba(59,130,246,0.2)] transition-all text-xs md:text-sm text-gray-100">
                        <span class="truncate pr-2"><i class="fa-solid fa-file-word text-blue-500 mr-1 md:text-lg"></i> Đề + Đáp Án Đỏ</span>
                        <span class="text-blue-400 font-bold bg-blue-500/10 px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-blue-500/30 whitespace-nowrap"><i class="fa-solid fa-download"></i> Tải</span>
                    </a>
                    <a href="${RENDER_SERVER_URL}${data.word_std_url}" class="flex items-center justify-between p-2 md:p-3 bg-[#0f141b] border border-[#1e293b] rounded-lg hover:border-sky-500 hover:shadow-[0_0_10px_rgba(14,165,233,0.2)] transition-all text-xs md:text-sm text-gray-100">
                        <span class="truncate pr-2"><i class="fa-solid fa-file-word text-sky-500 mr-1 md:text-lg"></i> Đề & Giải Riêng</span>
                        <span class="text-sky-400 font-bold bg-sky-500/10 px-2 py-1 md:px-3 md:py-1.5 rounded-lg border border-sky-500/30 whitespace-nowrap"><i class="fa-solid fa-download"></i> Tải</span>
                    </a>
                `;
                document.getElementById('resultZone').classList.remove('hidden');
                showStatus("Xử lý thành công!", "success");
            } catch (e) {
                showStatus("Lỗi Server xử lý!", "error");
            } finally {
                setLock(false); 
            }
        }

        async function handleExport() {
             if (isProcessing) return; 
             if (!currentAIContent || mảng_nội_dung.length === 0) { alert("Chưa có đề để xuất!"); return; }
             
             setLock(true); 
             showStatus("Đang tạo Word...", "loading");

             try {
                const markdownContent = mảng_nội_dung[0].trim();
                const response = await fetch(PANDOC_SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ markdown: markdownContent })
                });

                if (!response.ok) throw new Error("Server Pandoc từ chối");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `De_Thi_AI.docx`; 
                link.click();
                URL.revokeObjectURL(url);

                showStatus("Xuất Word thành công!", "success");
             } catch (error) {
                showStatus("Lỗi xuất file Word!", "error");
             } finally {
                 setLock(false); 
             }
        }
    </script>
