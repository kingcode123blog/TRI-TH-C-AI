name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Nếu branch của bạn là master, hãy sửa ở đây

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tiêm API Key vào file HTML
        run: |
          # Dùng sed để thay thế chuỗi placeholder bằng Secret
          sed -i "s/{{INJECT_API_KEYS_HERE}}/${{ secrets.GOOGLE_API_KEY }}/g" congcu1.html
          sed -i "s/{{INJECT_API_KEYS_HERE}}/${{ secrets.GOOGLE_API_KEY2 }}/g" congcu2.html
          sed -i "s/{{INJECT_API_KEYS_HERE}}/${{ secrets.GOOGLE_API_KEY3 }}/g" congcu3.html
          sed -i "s/{{INJECT_API_KEYS_HERE}}/${{ secrets.GOOGLE_API_KEY4 }}/g" congcu4.html

      - name: Cấu hình GitHub Pages
        uses: actions/configure-pages@v5

      - name: Nén và upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
