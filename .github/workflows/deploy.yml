name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# THÊM ĐOẠN NÀY ĐỂ CẤP QUYỀN GHI
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject API Keys vào HTML
        run: |
          sed -i 's/INJECT_API_KEYS_HERE/${{ secrets.GOOGLE_API_KEY }}/g' congcu1.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
